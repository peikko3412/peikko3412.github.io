<!DOCTYPE html>
<html>
<head>
  <title>Roblox Game ID Generator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 400px;
      background: #15151d;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    .warning {
      color: orange;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .subtext {
      color: #ffcc66;
      font-size: 13px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px;
      width: 100%;
      border: none;
      background: red;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: darkred;
    }

    .output {
      margin-top: 20px;
      font-size: 22px;
      color: lime;
      background: #0d0d12;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="card">

    <h1>🎮 Roblox Game ID Generator</h1>

    <div class="warning">⚠ WARNING</div>
    <div class="subtext">
      These IDs are randomly generated and may not be real Roblox game IDs.
    </div>

    <button onclick="generateID()">Generate ID</button>

    <div class="output" id="output">---</div>

  </div>

  <script>
    function generateID() {
      let id = Math.floor(Math.random() * 9000000000) + 1000000000;
      document.getElementById("output").innerText = id;
    }
  </script>

</body>
</html>

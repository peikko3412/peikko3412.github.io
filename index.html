<!DOCTYPE html>
<html>
<head>
<title>Roblox Game Hub</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:white;
  overflow:hidden;
}

.screen {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active {
  display:flex;
}

/* card */
.card {
  background:#15151d;
  padding:20px;
  width:400px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.7);
}

button {
  margin-top:10px;
  padding:10px;
  width:100%;
  background:red;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* feed */
.post {
  background:#1c1c25;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

img {
  width:100%;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- TUTORIAL -->
<div class="screen active" id="tutorial">
  <div class="card">
    <h1>🎮 Welcome</h1>
    <p>This is a Roblox Game Hub</p>
    <button onclick="nextScreen()">Start Tutorial</button>
  </div>
</div>

<div class="screen" id="tutorial2">
  <div class="card">
    <h1>📜 How it works</h1>
    <p>Generate IDs, browse posts, and share games</p>
    <button onclick="nextScreen()">Next</button>
  </div>
</div>

<div class="screen" id="main">

  <div class="card">

    <h1>🎮 Game Hub</h1>

    <input id="name" placeholder="Game Name"><br><br>
    <input id="id" placeholder="Game ID"><br><br>
    <input id="img" placeholder="Image URL"><br>

    <button onclick="addPost()">Post Game</button>

    <div id="feed"></div>

  </div>

</div>

<audio id="click" src="https://www.soundjay.com/buttons_c2026/sounds/button-15.mp3"></audio>

<script>
let screen = 0;

function playSound(){
  document.getElementById("click").play();
}

function nextScreen(){
  playSound();
  document.querySelectorAll(".screen")[screen].classList.remove("active");
  screen++;
  document.querySelectorAll(".screen")[screen].classList.add("active");
}

function addPost(){
  playSound();

  let name = document.getElementById("name").value;
  let id = document.getElementById("id").value;
  let img = document.getElementById("img").value;

  let post = document.createElement("div");
  post.className = "post";
  post.innerHTML = `
    <h3>${name}</h3>
    <p>ID: ${id}</p>
    <img src="${img}">
  `;

  document.getElementById("feed").appendChild(post);
}
</script>

</body>
</html>
